name: Connect Four CI

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Python
        run: python --version

      - name: Check Syntax
        run: python -m py_compile Connect-Four/main.py

      - name: Success
        run: echo "Workflow completed successfully"
